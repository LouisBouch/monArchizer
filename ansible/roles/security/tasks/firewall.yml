---
- name: Install nftables package
  community.general.pacman:
    name: "nftables"
    state: "present"
  become: true

- name: Create nftables configs
  ansible.builtin.template:
    src: "templates/nftables.conf.j2"
    dest: "/etc/nftables.conf"
    mode: "0644"
    owner: "root"
    group: "root"
  become: true
  notify: Reload nftables

- name: Check nftables status
  ansible.builtin.command:
    cmd: "systemctl is-enabled nftables"
  register: nftables_status
  changed_when: false
  failed_when: false

- name: Load nftables if it did start not at boot
  ansible.builtin.systemd_service:
    name: "nftables"
    state: "started"
  become: true
  when: nftables_status.stdout == "disabled"

- name: Enable nftables
  ansible.builtin.systemd_service:
    name: "nftables"
    enabled: true
  become: true
