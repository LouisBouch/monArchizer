---
- name: Install nftables package
  community.general.pacman:
    name: "nftables"
    state: "present"
  become: true

- name: Create nftables configs
  ansible.builtin.template:
    src: "templates/nftables.conf.j2"
    dest: "/etc/nftables.conf"
    mode: "0644"
    owner: "root"
    group: "root"
  become: true
  notify: Reload nftables

- name: Load nftables if it did not at boot
  ansible.builtin.systemd_service:
    name: "nftables"
    state: "restarted"
  become: true
  when: ansible_facts.services["nftables.service"].state == "disable"

- name: Enable nftables
  ansible.builtin.systemd_service:
    name: "nftables"
    enabled: true
  become: true
