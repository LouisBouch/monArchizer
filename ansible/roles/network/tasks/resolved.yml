---
- name: Enable and start resolved
  ansible.builtin.systemd_service:
    name: "systemd-resolved"
    state: "started"
    enabled: true
  become: true

- name: Ensure resolved drop-in config directory exists
  ansible.builtin.file:
    path: "/etc/systemd/resolved.conf.d"
    state: "directory"
    mode: "0755"
  become: true

- name: Privacy configs for resolved
  ansible.builtin.copy:
    content: |
      [Resolve]
      DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com 9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net
      DNSOverTLS=yes
      DNSSEC=yes
      FallbackDNS=
    dest: "/etc/systemd/resolved.conf.d/privacy.conf"
    mode: "0644"
  become: true
  notify: Restart resolved

- name: Link stub
  ansible.builtin.file:
    src: "/run/systemd/resolve/stub-resolv.conf"
    dest: "/etc/resolv.conf"
    state: "link"
    force: true
  become: true
