---
- name: Enable and start resolved
  ansible.builtin.systemd_service:
    name: "systemd-resolved"
    state: "started"
    enabled: true
  become: true

- name: Ensure resolved drop-in config directory exists
  ansible.builtin.file:
    path: "/etc/systemd/resolved.conf.d"
    state: "directory"
    mode: "0755"
  become: true

- name: Privacy configs for resolved
  ansible.builtin.template:
    src: "templates/resolved_privacy.conf.j2"
    dest: "/etc/systemd/resolved.conf.d/resolved_privacy.conf"
    mode: "0644"
  become: true
  notify: Restart resolved

- name: Link stub
  ansible.builtin.file:
    src: "/run/systemd/resolve/stub-resolv.conf"
    dest: "/etc/resolv.conf"
    state: "link"
    force: true
  become: true
